<body>

<!-- LOGIN PAGE -->
<div id="loginPage" style="position:fixed; inset:0; background:#0d0d14; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:#1e1e30; padding:40px; border-radius:20px; border:1px solid #c9a84c; width:340px; text-align:center;">
        <h2 style="color:#e8c97a;">ZAIQA POS Login</h2>
        <input type="text" id="loginUser" placeholder="Username" style="width:100%; padding:12px; margin:12px 0; background:#13131f; border:1px solid #c9a84c33; color:white; border-radius:8px;">
        <input type="password" id="loginPass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; background:#13131f; border:1px solid #c9a84c33; color:white; border-radius:8px;">
        <button id="loginSubmit" style="width:100%; padding:12px; background:#c9a84c; color:black; font-weight:bold; border:none; border-radius:8px;">Login</button>
        <p id="loginError" style="color:#e85d75; margin-top:12px;"></p>
    </div>
</div>

<!-- MAIN APP WRAPPER -->
<div id="appWrapper" style="display:none;">
    <!-- Sidebar, Topbar, Main Content (same as your original working layout) -->
    <!-- I'll include a compact version; you can reuse your exact HTML structure from before adding restaurant_id -->
    <div class="toast" id="toast"></div>
    <nav class="sidebar">...</nav>
    <header class="topbar">...</header>
    <main class="main">...</main>
</div>

<script>
    // ==================== VERSION TRACKING (AUTO LOGOUT) ====================
    async function checkPasswordVersion() {
        const userId = localStorage.getItem('userId');
        const storedVersion = localStorage.getItem('passwordVersion');
        if (!userId || !storedVersion) return true;
        try {
            const res = await fetch('https://oracleapex.com/ords/wksp-musoft/restaurant/checkVersion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            });
            const data = await res.json();
            if (data.version && data.version != storedVersion) {
                logout();
                showToast('Your password has been changed. Please login again.');
                return false;
            }
            return true;
        } catch(e) {
            console.error('Version check failed', e);
            return true;
        }
    }

    // ==================== LOGIN (hardcoded with version) ====================
    async function doLogin() {
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        const errorDiv = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginSubmit');

        // Hardcoded users (admin/1234, kitchen/1234) – no restaurant_id
        if (username === 'admin' && password === '1234') {
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('userRole', 'admin');
            localStorage.setItem('userId', '1');
            localStorage.setItem('passwordVersion', '1'); // static version
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appWrapper').style.display = 'block';
            showToast('Admin login successful');
            document.querySelectorAll('.tab').forEach(t => t.style.display = '');
            document.querySelectorAll('.nav-item').forEach(n => n.style.display = '');
            loadDashboard();
        }
        else if (username === 'kitchen' && password === '1234') {
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('userRole', 'kitchen');
            localStorage.setItem('userId', '2');
            localStorage.setItem('passwordVersion', '1');
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appWrapper').style.display = 'block';
            restrictToKitchen();
            switchPage('kitchen', 2);
        }
        else {
            errorDiv.innerText = 'Invalid username or password';
        }
    }

    function restrictToKitchen() { /* same as before */ }
    function logout() { localStorage.clear(); location.reload(); }

    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('loggedIn') === 'true') {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appWrapper').style.display = 'block';
            if (localStorage.getItem('userRole') === 'kitchen') {
                restrictToKitchen();
                switchPage('kitchen', 2);
            } else {
                switchPage('dashboard', 0);
            }
        } else {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('appWrapper').style.display = 'none';
        }
    });

    document.getElementById('loginSubmit').addEventListener('click', doLogin);
    document.getElementById('loginPass').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });

    // ==================== ORIGINAL API (NO restaurant_id) ====================
    const BASE_URL = 'https://oracleapex.com/ords/wksp-musoft/restaurant/'; // your original base
    let allMenuItems = [], cart = [], currentOrderType = 'counter', lastToken = {};

    async function apiGet(endpoint) {
        const res = await fetch(BASE_URL + endpoint);
        return await res.json();
    }
    async function apiPost(endpoint, data) {
        const res = await fetch(BASE_URL + endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return await res.json();
    }
    async function apiPut(endpoint, data) {
        const res = await fetch(BASE_URL + endpoint, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return await res.json();
    }

    // All other functions (loadDashboard, loadMenuItems, placeOrder, showSlip, loadKitchenOrders, updateStatus, menuMgmt, etc.)
    // must be exactly as they were BEFORE adding restaurant_id.
    // For brevity, I'm not repeating the entire code here – you already have it from your working version.

    // Make sure to call checkPasswordVersion() at the start of each important async function (like loadDashboard, loadMenuItems, placeOrder, updateStatus)

    async function loadDashboard() {
        const isValid = await checkPasswordVersion();
        if (!isValid) return;
        // ... original loadDashboard code (without restaurant_id)
    }

    // ... rest of your original functions (same as before multi-tenant changes)

</script>
